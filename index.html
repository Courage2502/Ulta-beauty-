<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ulta Beauty – $750 Gift Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F97316;
      --orange-dark: #EA6C0A;
      --orange-light: #FFF3E8;
      --text: #1a1a1a;
      --white: #ffffff;
    }
    body {
      font-family: 'Open Sans', sans-serif;
      background: linear-gradient(160deg, #fff8f2 0%, #ffe8d0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 40px;
    }
    .notif-bar {
      background: #fff;
      border: 1.5px solid #ffe0c0;
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(249,115,22,.15);
      animation: fadeDown .6s ease both;
    }
    .notif-bar span.name { color: var(--orange); }
    .notif-bar .star { font-size: 18px; }
    .card {
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(249,115,22,.18);
      padding: 36px 28px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: fadeUp .7s ease both .1s;
    }
    .logo-wrap {
      margin-bottom: 22px;
      display: flex;
      justify-content: center;
    }
    .logo-wrap img {
      width: 220px;
      height: auto;
      border-radius: 18px;
      box-shadow: 0 6px 28px rgba(249,115,22,.4);
      display: block;
    }
    .prize-amount {
      font-family: 'Montserrat', sans-serif;
      font-size: 64px;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
      letter-spacing: -2px;
    }
    .prize-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: #999;
      margin-top: 4px;
      margin-bottom: 28px;
      text-transform: uppercase;
    }
    .steps {
      background: var(--orange-light);
      border-radius: 16px;
      padding: 20px 18px;
      margin-bottom: 28px;
      text-align: left;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid #fdd9b5;
    }
    .step:last-child { border-bottom: none; padding-bottom: 0; }
    .step:first-child { padding-top: 0; }
    .step-num {
      background: var(--orange);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 16px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
    }
    .cta-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 18px 24px;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(249,115,22,.5);
      animation: none;
    }
    .cta-btn:active { transform: translateY(0); }
    
    footer {
      max-width: 420px;
      width: 100%;
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #aaa;
      line-height: 1.7;
      animation: fadeUp .8s ease both .3s;
    }
    footer a { color: #aaa; text-decoration: underline; }
    footer .copyright { margin-top: 8px; font-weight: 600; color: #bbb; }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 6px 24px rgba(249,115,22,.4); }
      50%       { box-shadow: 0 6px 36px rgba(249,115,22,.7); }
    }
    @keyframes notifFade {
      0%   { opacity: 0; transform: translateY(-8px); }
      10%  { opacity: 1; transform: translateY(0); }
      85%  { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-8px); }
    }
    .notif-bar { animation: notifFade 4s ease both; }
  </style>
</head>
